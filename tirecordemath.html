<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tir à la Corde – Maths</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

:root {
  --bleu:       #2355b0;
  --bleu-d:     #1a3a6e;
  --bleu-l:     #4a90d9;
  --rouge:      #b02323;
  --rouge-d:    #6e1a1a;
  --rouge-l:    #d95050;
  --fond:       #7aa8c8;
  --gris-clav:  #dce8f2;
  --gris-btn:   #c8d8e8;
  --jaune:      #f5c842;
  --vert:       #2dc653;
  --blanc:      #ffffff;
  --corde:      #8B6914;
  --corde-l:    #c9a84c;
}

html, body { width:100%; height:100%; overflow:hidden; }

body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #8fbdd8 0%, #6a9ab8 100%);
}

.screen { width:100%; height:100vh; display:none; flex-direction:column; overflow:hidden; }
.screen.on { display:flex; }

/* =========== CONFIG =========== */
#cfg {
  background: linear-gradient(160deg, #8fbdd8 0%, #5a8aaa 100%);
  align-items: center;
  padding: 16px 20px 20px;
  gap: 14px;
  overflow-y: auto;
}

.cfg-title {
  font-family:'Fredoka One',cursive;
  font-size: clamp(1.6rem,4vw,2.8rem);
  color: #fff;
  text-shadow: 0 3px 10px rgba(0,0,0,0.3);
  text-align: center;
  flex-shrink:0;
}

.cfg-ops {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 860px;
  flex-shrink:0;
}

.op-card {
  background: rgba(255,255,255,0.93);
  border-radius: 16px;
  padding: 12px 10px;
  cursor: pointer;
  border: 3px solid transparent;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  transition: transform .15s, border-color .15s;
}
.op-card.sel { border-color: var(--jaune); }
.op-card:active { transform:scale(0.97); }

.op-sym { font-family:'Fredoka One',cursive; font-size:1.8rem; text-align:center; }
.op-card[data-op="addition"]      .op-sym { color: var(--bleu); }
.op-card[data-op="soustraction"]  .op-sym { color: var(--rouge); }
.op-card[data-op="multiplication"].op-sym { color: #b07a00; }
.op-card[data-op="division"]      .op-sym { color: #1a8a4a; }
.op-card[data-op="complement"]    .op-sym { color: #7b2fb0; }
.op-card[data-op="mixte"]         .op-sym { color: #b04a00; }

.op-nom { font-size:.78rem; font-weight:900; text-align:center; color:#333; margin:3px 0 7px; }
.lvl-row { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; }
.lb {
  background:#e0eaf5; border:2px solid #b8cfe0; border-radius:7px;
  padding:3px 7px; font-size:.62rem; font-weight:800; color:#445;
  cursor:pointer; font-family:'Nunito',sans-serif; transition:background .12s;
}
.lb.on { background:var(--jaune); border-color:#d4a800; color:#333; }

.cfg-row {
  display:flex; align-items:center; gap:12px;
  background:rgba(255,255,255,0.9); border-radius:14px;
  padding:12px 20px; max-width:480px; width:100%;
  box-shadow:0 3px 10px rgba(0,0,0,0.12); flex-shrink:0;
}
.cfg-row label { font-weight:900; font-size:.9rem; color:#333; }
.cfg-row input[type=range] { flex:1; accent-color:var(--bleu); }
.cfg-row span { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--bleu); min-width:26px; }

.btn-go-cfg {
  font-family:'Fredoka One',cursive; font-size:1.7rem; letter-spacing:2px;
  padding:14px 46px; border-radius:50px; border:none;
  background:linear-gradient(135deg,#1a6edb,#7b2ff7); color:#fff;
  cursor:pointer; box-shadow:0 6px 22px rgba(26,110,219,0.45);
  transition:transform .12s; flex-shrink:0;
}
.btn-go-cfg:active { transform:scale(0.96); }

/* =========== JEU =========== */
#game {
  background:linear-gradient(160deg,#8fbdd8 0%,#6a9ab8 100%);
  flex-direction: column;
}

/* Bandeau 4 questions en haut */
.questions-band {
  flex-shrink:0;
  display:flex; flex-direction:row;
  height:78px;
  background:rgba(0,0,0,0.2);
  border-bottom:2px solid rgba(255,255,255,0.1);
  gap:3px; padding:3px;
}
.q-banner {
  flex:1; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.1rem,2.6vw,2rem);
  color:#fff; text-align:center; padding:0 8px;
  line-height:1.15;
}
.q-banner.bk { background:rgba(35,85,176,0.7); border:2px solid var(--bleu); }
.q-banner.rk { background:rgba(176,35,35,0.7); border:2px solid var(--rouge); }
.q-banner-sep { width:5px; background:rgba(255,255,255,0.15); border-radius:3px; flex-shrink:0; }

/* Animations bannières */
.q-banner.anim-ok {
  animation: banner-ok 0.7s ease forwards;
}
.q-banner.anim-ko {
  animation: banner-ko 0.6s ease forwards;
}
@keyframes banner-ok {
  0%   { transform:scale(1);   background:rgba(45,198,83,0.9);  box-shadow:0 0 0 0 rgba(45,198,83,0.8); }
  30%  { transform:scale(1.06); box-shadow:0 0 0 14px rgba(45,198,83,0); }
  60%  { transform:scale(1.03); background:rgba(45,198,83,0.95); }
  100% { transform:scale(1);   background:rgba(45,198,83,0.85); box-shadow:0 0 0 0 rgba(45,198,83,0); }
}
@keyframes banner-ko {
  0%,100% { transform:translateX(0);  background:rgba(217,80,80,0.9); }
  15%     { transform:translateX(-8px); }
  30%     { transform:translateX(8px); }
  45%     { transform:translateX(-6px); }
  60%     { transform:translateX(6px); }
  75%     { transform:translateX(-3px); }
}

/* Étoiles particules autour de la bannière */
.star-particle {
  position:fixed; pointer-events:none; font-size:1.4rem; z-index:999;
  animation: star-burst 0.8s ease-out forwards;
}
@keyframes star-burst {
  0%   { opacity:1; transform:translate(0,0) scale(1); }
  100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.3); }
}

.top-bar {
  height:44px; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 10px; background:rgba(0,0,0,0.2); gap:8px;
}
.tscore {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  display:flex; align-items:center; gap:6px;
}
.tscore.b { color:#a8d4ff; }
.tscore.r { color:#ffaaaa; }
.tscore .sv {
  background:rgba(255,255,255,0.2); border-radius:8px;
  padding:1px 12px; color:#fff; font-size:1.35rem;
}
.top-info { font-size:.7rem; color:rgba(255,255,255,.75); font-weight:800; text-align:center; line-height:1.3; }
.btn-q {
  background:rgba(255,255,255,.15); border:none; border-radius:7px;
  color:rgba(255,255,255,.7); padding:5px 10px; font-size:.8rem;
  font-weight:800; cursor:pointer; font-family:'Nunito',sans-serif;
}

/* Zone principale : arena en haut, 4 claviers côte à côte en bas */
.game-body {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; min-height:0; gap:5px; padding:5px;
}

/* Rangée des 4 claviers */
.kb-row {
  height: 240px;
  flex-shrink:0;
  display:flex; flex-direction:row; gap:0;
  pointer-events:none;
}

/* Groupes gauche et droite */
.kb-group {
  display:flex; flex-direction:row; gap:192px;
  pointer-events:all;
}
.kb-group.left  { margin-right:auto; padding-right:30px; }
.kb-group.right { margin-left:auto;  padding-left:30px; }

/* Séparateur visuel entre équipes (espace central) */
.kb-sep {
  flex:1;
}

/* Arena centrale */
.arena-col {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; min-width:0; min-height:0;
}

/* Barre progression */
.prog {
  height:12px; flex-shrink:0; position:relative;
  background:rgba(0,0,0,.18); overflow:hidden; border-radius:6px;
  margin-bottom:4px;
}
.prog-r { position:absolute; top:0; bottom:0; left:0; background:var(--rouge-l); transition:right .4s cubic-bezier(.34,1.56,.64,1); border-radius:6px 0 0 6px; }
.prog-b { position:absolute; top:0; bottom:0; right:0; background:var(--bleu-l); transition:left .4s cubic-bezier(.34,1.56,.64,1); border-radius:0 6px 6px 0; }
.prog-mid { position:absolute; top:0; bottom:0; left:50%; width:3px; transform:translateX(-50%); background:rgba(255,255,255,.7); }

/* Arena */
.arena {
  flex:1; position:relative; overflow:hidden; min-height:0;
}
.arena-svg { position:absolute; width:100%; height:100%; top:0; left:0; }

/* Personnages dans l'arena */
.perso {
  position:absolute; bottom:4px;
  display:flex; flex-direction:column; align-items:center; gap:1px;
  pointer-events:none;
  transition:transform .45s cubic-bezier(.34,1.56,.64,1);
}
#pb { left:12%; }
#pr { right:12%; }
.pname { font-size:.55rem; font-weight:900; color:rgba(255,255,255,.85); font-family:'Nunito',sans-serif; }

/* Clavier individuel compact */
.kb {
  width: 160px;
  flex-shrink:0;
  background:var(--gris-clav);
  border-radius:14px; padding:5px 4px;
  display:flex; flex-direction:column; gap:3px;
  box-shadow:0 4px 14px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.8);
  overflow:hidden;
}
.kb.bk { border:3px solid var(--bleu); }
.kb.rk { border:3px solid var(--rouge); }

.kb-q {
  border-radius:8px; padding:4px 4px; text-align:center;
  font-family:'Fredoka One',cursive;
  font-size:clamp(.75rem,1.1vw,1rem); color:#fff; flex-shrink:0;
  min-height:28px; display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.22); line-height:1.2;
}
.bk .kb-q { background:var(--bleu); }
.rk .kb-q { background:var(--rouge); }

.kb-disp {
  background:rgba(255,255,255,.92); border-radius:6px;
  padding:2px 4px; text-align:center;
  font-family:'Fredoka One',cursive; font-size:clamp(.85rem,1.2vw,1.1rem);
  color:#333; flex-shrink:0; min-height:26px;
  display:flex; align-items:center; justify-content:center;
  border:2px solid rgba(0,0,0,.07);
}
.kb-disp.empty { color:#aaa; }

.kb-grid {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:3px; flex:1; min-height:0;
}

.kb-btn {
  background:var(--blanc); border:none; border-radius:8px;
  font-family:'Fredoka One',cursive;
  font-size:clamp(.75rem,1.1vw,.95rem); color:#334;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 0 rgba(0,0,0,.12);
  transition:transform .07s, box-shadow .07s;
  min-height:0; user-select:none;
}
.kb-btn:active { transform:scale(0.88) translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.12); }
.kb-btn.bc { background:var(--rouge-l); color:#fff; font-size:clamp(.65rem,1vw,.85rem); }
.kb-btn.bz { background:var(--gris-btn); }
.bk .kb-btn.bg { background:var(--bleu); color:#fff; font-size:clamp(.65rem,1vw,.85rem); }
.rk .kb-btn.bg { background:var(--rouge); color:#fff; font-size:clamp(.65rem,1vw,.85rem); }

.kb-pts { text-align:center; font-size:.58rem; font-weight:900; color:#667; flex-shrink:0; line-height:1; }

.kb-btn.ok-flash { background:var(--vert) !important; color:#fff; animation:fok .35s; }
.kb-btn.ko-flash { background:var(--rouge-l) !important; color:#fff; animation:fko .3s; }
@keyframes fok { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes fko { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

.bk .kb-pts span { color:var(--bleu); font-family:'Fredoka One',cursive; font-size:.75rem; }
.rk .kb-pts span { color:var(--rouge); font-family:'Fredoka One',cursive; font-size:.85rem; }

/* =========== VICTOIRE =========== */
#win {
  background:linear-gradient(160deg,#8fbdd8 0%,#5a8aaa 100%);
  align-items:center; justify-content:center; gap:18px; padding:30px;
}
.win-ico { font-size:4rem; animation:bonce 1s infinite alternate; }
@keyframes bonce { from{transform:translateY(0)} to{transform:translateY(-18px)} }
.win-big { font-family:'Fredoka One',cursive; font-size:clamp(2rem,7vw,4.5rem); color:#fff; text-shadow:0 4px 14px rgba(0,0,0,.3); text-align:center; }
.win-sub { color:rgba(255,255,255,.85); font-size:1rem; font-weight:800; }
.win-sc { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.wbox { background:rgba(255,255,255,.92); border-radius:16px; padding:16px 26px; box-shadow:0 5px 18px rgba(0,0,0,.2); }
.wbox .wl { font-size:.85rem; font-weight:900; color:#556; margin-bottom:4px; }
.wbox .wv { font-family:'Fredoka One',cursive; font-size:2.6rem; }
.wbox.wb .wv { color:var(--bleu); }
.wbox.wr .wv { color:var(--rouge); }
.wbtns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.wbtn {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:12px 30px; border-radius:50px; border:none; cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.2); transition:transform .12s;
}
.wbtn:active { transform:scale(0.95); }
.wbtn.wc { background:rgba(255,255,255,.92); color:#333; }
.wbtn.wp { background:linear-gradient(135deg,var(--bleu),#7b2ff7); color:#fff; }

/* Confetti */
.cft { position:fixed; pointer-events:none; border-radius:2px; animation:cffall linear forwards; }
@keyframes cffall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(600deg);opacity:0} }
</style>
</head>
<body>

<!-- ===== CONFIG ===== -->
<div id="cfg" class="screen on">
  <div class="cfg-title">🪢 Tir à la Corde – Maths</div>

  <div class="cfg-ops">
    <div class="op-card sel" data-op="addition" onclick="pickOp(this)">
      <div class="op-sym">＋</div><div class="op-nom">Addition</div>
      <div class="lvl-row" id="lv-addition">
        <button class="lb on" onclick="pickLvl(event,'addition',0)">1c+1c</button>
        <button class="lb" onclick="pickLvl(event,'addition',1)">2c+1c</button>
        <button class="lb" onclick="pickLvl(event,'addition',2)">2c+2c</button>
        <button class="lb" onclick="pickLvl(event,'addition',3)">3c+2c</button>
        <button class="lb" onclick="pickLvl(event,'addition',4)">Décimaux</button>
      </div>
    </div>
    <div class="op-card" data-op="soustraction" onclick="pickOp(this)">
      <div class="op-sym">−</div><div class="op-nom">Soustraction</div>
      <div class="lvl-row" id="lv-soustraction">
        <button class="lb on" onclick="pickLvl(event,'soustraction',0)">1c−1c</button>
        <button class="lb" onclick="pickLvl(event,'soustraction',1)">2c−1c</button>
        <button class="lb" onclick="pickLvl(event,'soustraction',2)">2c−2c</button>
        <button class="lb" onclick="pickLvl(event,'soustraction',3)">3c−2c</button>
        <button class="lb" onclick="pickLvl(event,'soustraction',4)">Décimaux</button>
      </div>
    </div>
    <div class="op-card" data-op="multiplication" onclick="pickOp(this)">
      <div class="op-sym">×</div><div class="op-nom">Multiplication</div>
      <div class="lvl-row" id="lv-multiplication">
        <button class="lb on" onclick="pickLvl(event,'multiplication',0)">1c×1c</button>
        <button class="lb" onclick="pickLvl(event,'multiplication',1)">2c×1c</button>
        <button class="lb" onclick="pickLvl(event,'multiplication',2)">2c×2c</button>
        <button class="lb" onclick="pickLvl(event,'multiplication',3)">3c×2c</button>
        <button class="lb" onclick="pickLvl(event,'multiplication',4)">Décimaux</button>
      </div>
    </div>
    <div class="op-card" data-op="division" onclick="pickOp(this)">
      <div class="op-sym">÷</div><div class="op-nom">Division</div>
      <div class="lvl-row" id="lv-division">
        <button class="lb on" onclick="pickLvl(event,'division',0)">Tables ×2→×10</button>
        <button class="lb" onclick="pickLvl(event,'division',1)">÷25, ÷50, ÷100…</button>
      </div>
    </div>
    <div class="op-card" data-op="complement" onclick="pickOp(this)">
      <div class="op-sym">?+</div><div class="op-nom">Complément à…</div>
      <div class="lvl-row" id="lv-complement">
        <button class="lb on" onclick="pickLvl(event,'complement',0)">à 10</button>
        <button class="lb" onclick="pickLvl(event,'complement',1)">à 20</button>
        <button class="lb" onclick="pickLvl(event,'complement',2)">à 100</button>
        <button class="lb" onclick="pickLvl(event,'complement',3)">à 1000</button>
        <button class="lb" onclick="pickLvl(event,'complement',4)">Aléatoire</button>
      </div>
    </div>
    <div class="op-card" data-op="mixte" onclick="pickOp(this)">
      <div class="op-sym">🎲</div><div class="op-nom">Mixte</div>
      <div class="lvl-row" id="lv-mixte">
        <button class="lb on" onclick="pickLvl(event,'mixte',0)">CP</button>
        <button class="lb" onclick="pickLvl(event,'mixte',1)">CE1</button>
        <button class="lb" onclick="pickLvl(event,'mixte',2)">CE2</button>
        <button class="lb" onclick="pickLvl(event,'mixte',3)">CM1</button>
        <button class="lb" onclick="pickLvl(event,'mixte',4)">CM2</button>
      </div>
    </div>
  </div>

  <div class="cfg-row">
    <label>🏆 Points d'écart pour gagner</label>
    <input type="range" id="rng" min="3" max="20" value="7"
           oninput="document.getElementById('rv').textContent=this.value">
    <span id="rv">7</span>
  </div>
  <button class="btn-go-cfg" onclick="startGame()">🚀 JOUER !</button>
</div>

<!-- ===== JEU ===== -->
<div id="game" class="screen">
  <div class="top-bar">
    <div class="tscore b">🔵 <span class="sv" id="sc-b">0</span></div>
    <div class="top-info" id="top-info">Additions · Niv.1</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="tscore r"><span class="sv" id="sc-r">0</span> 🔴</div>
      <button class="btn-q" onclick="goConfig()">✕</button>
    </div>
  </div>

  <!-- Bandeau des 4 questions visibles par toute la classe -->
  <div class="questions-band">
    <div class="q-banner bk" id="qb-b1">–</div>
    <div class="q-banner bk" id="qb-b2">–</div>
    <div class="q-banner-sep"></div>
    <div class="q-banner rk" id="qb-r1">–</div>
    <div class="q-banner rk" id="qb-r2">–</div>
  </div>

  <!-- Corps du jeu : arena en haut, 4 claviers côte à côte en bas -->
  <div class="game-body">

    <!-- Arena centrale en haut -->
    <div class="arena-col">
      <div class="prog">
        <div class="prog-r" id="pr-bar" style="right:50%"></div>
        <div class="prog-b" id="pb-bar" style="left:50%"></div>
        <div class="prog-mid"></div>
      </div>

      <div class="arena">
        <svg class="arena-svg" viewBox="0 0 1000 300" preserveAspectRatio="none" id="asv">
          <!-- Sol herbe -->
          <rect x="0" y="270" width="1000" height="30" fill="rgba(60,140,60,0.25)" rx="0"/>
          <line x1="0" y1="270" x2="1000" y2="270" stroke="rgba(80,160,80,0.4)" stroke-width="2"/>
          <!-- Ligne centrale pointillée -->
          <line x1="500" y1="0" x2="500" y2="300" stroke="rgba(255,255,255,0.45)" stroke-width="3" stroke-dasharray="10,8"/>
          <!-- Zones de victoire (foncées) -->
          <rect x="0" y="0" width="80" height="300" fill="rgba(180,35,35,0.12)" rx="0"/>
          <rect x="920" y="0" width="80" height="300" fill="rgba(35,85,176,0.12)" rx="0"/>
          <!-- Corde -->
          <path id="rp1" d="" stroke="#8B6914" stroke-width="9" fill="none" stroke-linecap="round"/>
          <path id="rp2" d="" stroke="#e5c86d" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.65"/>
          <!-- Drapeau -->
          <g id="fg" transform="translate(500,155)">
            <rect x="-4" y="-50" width="8" height="100" fill="#555" rx="4"/>
            <polygon points="0,-50 34,-32 0,-14" fill="#e63946"/>
            <polygon points="0,-50 -34,-32 0,-14" fill="#e63946" opacity="0.5"/>
          </g>
        </svg>

        <!-- Perso BLEU -->
        <div id="pb" class="perso">
          <svg width="144" height="176" viewBox="0 0 64 78">
            <ellipse cx="32" cy="72" rx="16" ry="5" fill="rgba(0,0,0,0.13)"/>
            <rect x="19" y="50" width="8" height="18" rx="4" fill="#1a3a8a"/>
            <rect x="29" y="53" width="8" height="15" rx="4" fill="#1a3a8a"/>

        <!-- Perso ROUGE -->

            <rect x="14" y="30" width="28" height="24" rx="8" fill="#b02323"/>

<!-- ===== VICTOIRE ===== -->
<div id="win" class="screen">
  <div class="win-ico">🏆</div>
  <div class="win-big" id="wm">ÉQUIPE BLEUE GAGNE !</div>
  <div class="win-sub" id="wd">Objectif atteint !</div>
  <div class="win-sc">
    <div class="wbox wb"><div class="wl">🔵 Équipe Bleue</div><div class="wv" id="ws-b">0</div></div>
    <div class="wbox wr"><div class="wl">🔴 Équipe Rouge</div><div class="wv" id="ws-r">0</div></div>
  </div>
  <div class="wbtns">
    <button class="wbtn wc" onclick="goConfig()">⚙️ Config</button>
    <button class="wbtn wp" onclick="replayGame()">🔁 Rejouer</button>
  </div>
</div>

<script>
// ===== STATE =====
let selOp='addition', selLvls={addition:0,soustraction:0,multiplication:0,division:0,complement:0,mixte:0};
let target=7, running=false, lastCfg=null;
let scores={b:0,r:0}, ppts={b1:0,b2:0,r1:0,r2:0};
let curVal={b1:'',b2:'',r1:'',r2:''}, curQ={b1:null,b2:null,r1:null,r2:null};

// ===== CONFIG =====
function pickOp(card){
  document.querySelectorAll('.op-card').forEach(c=>c.classList.remove('sel'));
  card.classList.add('sel'); selOp=card.dataset.op;
}
function pickLvl(e,op,lvl){
  e.stopPropagation();
  document.querySelectorAll(`#lv-${op} .lb`).forEach(b=>b.classList.remove('on'));
  e.target.classList.add('on'); selLvls[op]=lvl;
  pickOp(e.target.closest('.op-card'));
}

// ===== GÉNÉRATION =====
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function genQ(op,lvl){
  let a,b,ans,txt;
  switch(op){
    case 'addition':
      if(lvl===0){a=rnd(1,9);b=rnd(1,9);}
      else if(lvl===1){a=rnd(10,99);b=rnd(1,9);}
      else if(lvl===2){a=rnd(10,99);b=rnd(10,99);}
      else if(lvl===3){a=rnd(100,999);b=rnd(10,99);}
      else{a=+(rnd(1,9)+rnd(0,9)/10).toFixed(1);b=+(rnd(1,9)+rnd(0,9)/10).toFixed(1);}
      ans=Math.round((a+b)*100)/100; txt=`${a} + ${b} =`; break;
    case 'soustraction':
      if(lvl===0){a=rnd(2,18);b=rnd(1,a);}
      else if(lvl===1){a=rnd(12,99);b=rnd(1,9);}
      else if(lvl===2){a=rnd(20,99);b=rnd(10,a<10?10:a);}
      else if(lvl===3){a=rnd(110,999);b=rnd(10,99);}
      else{a=+(rnd(1,9)+rnd(0,9)/10).toFixed(1);b=+(rnd(0,Math.floor(a))+rnd(0,9)/10).toFixed(1);if(b>a)b=0;}
      ans=Math.round((a-b)*100)/100; txt=`${a} − ${b} =`; break;
    case 'multiplication':
      if(lvl===0){a=rnd(2,9);b=rnd(2,9);}
      else if(lvl===1){a=rnd(11,99);b=rnd(2,9);}
      else if(lvl===2){a=rnd(11,99);b=rnd(11,99);}
      else if(lvl===3){a=rnd(100,999);b=rnd(11,99);}
      else{a=rnd(2,9);b=+(rnd(1,9)/10).toFixed(1);}
      ans=Math.round(a*b*100)/100; txt=`${a} × ${b} =`; break;
    case 'division':
      if(lvl===0){b=rnd(2,10);ans=rnd(1,10);a=b*ans;}
      else{const ds=[25,50,100,200,250,500,1000];b=ds[rnd(0,ds.length-1)];ans=rnd(1,10);a=b*ans;}
      txt=`${a} ÷ ${b} =`; break;
    case 'complement':
      const ts=[10,20,100,1000];
      let t=lvl<4?ts[lvl]:rnd(2,1000);
      a=rnd(1,t-1);ans=t-a; txt=`${a}+?=${t}`; break;
    case 'mixte':{
      // CP(0): + et - < 10
      // CE1(1): compléments à 10, + et - jusqu'à 100, ×1 ×2 ×5 ×10
      // CE2(2): + CE1 + autres tables ×, compléments à 100
      // CM1(3): + CE2 + divisions simples (tables ×2→×5)
      // CM2(4): tout (divisions tables complètes, compléments à 1000, décimaux)
      if(lvl===0){
        const op2=rnd(0,1)?'addition':'soustraction';
        return genQ(op2,0); // 1c op 1c
      }
      if(lvl===1){
        const r=rnd(0,2);
        if(r===0){ // complément à 10
          a=rnd(1,9); ans=10-a; txt=`${a}+?=10`; break;
        } else if(r===1){ // + ou - jusqu'à 100 (2c+1c)
          const op2=rnd(0,1)?'addition':'soustraction';
          return genQ(op2,1);
        } else { // ×1 ×2 ×5 ×10
          const tables=[1,2,5,10]; b=tables[rnd(0,tables.length-1)]; a=rnd(1,10);
          ans=a*b; txt=`${a} × ${b} =`; break;
        }
      }
      if(lvl===2){
        const r=rnd(0,3);
        if(r===0){ // complément à 100
          a=rnd(1,99); ans=100-a; txt=`${a}+?=100`; break;
        } else if(r===1){ // + ou - 2c+2c
          const op2=rnd(0,1)?'addition':'soustraction';
          return genQ(op2,2);
        } else { // toutes les tables
          b=rnd(2,9); a=rnd(1,10); ans=a*b; txt=`${a} × ${b} =`; break;
        }
      }
      if(lvl===3){
        const r=rnd(0,4);
        if(r===0){ return genQ('complement',2); } // à 100
        else if(r===1){ return genQ('addition',2); }
        else if(r===2){ return genQ('soustraction',2); }
        else if(r===3){ b=rnd(2,9);a=rnd(1,10);ans=a*b;txt=`${a} × ${b} =`; break; }
        else { // division simple tables ×2→×5
          const dt=[2,3,4,5]; b=dt[rnd(0,dt.length-1)]; ans=rnd(1,10); a=b*ans;
          txt=`${a} ÷ ${b} =`; break;
        }
      }
      // CM2 : tout
      const allOps=['addition','soustraction','multiplication','division','complement'];
      const allLvl=[2,2,1,0,3];
      const idx=rnd(0,allOps.length-1);
      return genQ(allOps[idx],allLvl[idx]);
    }
  }
  return {txt,ans:Math.round(ans*100)/100};
}

// ===== CLAVIERS =====
const PLAYERS=['b1','b2','r1','r2'];
const LAYOUT=[7,8,9,4,5,6,1,2,3,'C',0,'Go'];

function buildKbds(){
  PLAYERS.forEach(p=>{
    const g=document.getElementById(`g-${p}`);
    g.innerHTML='';
    LAYOUT.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='kb-btn';
      btn.textContent=k;
      if(k==='C')  btn.classList.add('bc');
      if(k==='Go') btn.classList.add('bg');
      if(k===0)    btn.classList.add('bz');
      // Touch + click pour TNI
      btn.addEventListener('pointerdown',e=>{e.preventDefault();pressKey(p,k);},{passive:false});
      g.appendChild(btn);
    });
  });
}

function pressKey(p,k){
  if(!running)return;
  if(k==='C'){curVal[p]='';refreshDisp(p);return;}
  if(k==='Go'){checkAns(p);return;}
  const s=(curVal[p]+k).replace(/^0+(\d)/,'$1');
  curVal[p]=s.length>8?s.slice(0,8):s;
  refreshDisp(p);
}

function refreshDisp(p){
  const d=document.getElementById(`d-${p}`);
  if(!curVal[p]){d.textContent='?';d.classList.add('empty');}
  else{d.textContent=curVal[p];d.classList.remove('empty');}
}

function flashBtn(p,cls){
  const btn=document.querySelector(`#g-${p} .bg`);
  btn.classList.add(cls); setTimeout(()=>btn.classList.remove(cls),380);
}

// Lance des étoiles autour de la bannière
function burstStars(bannerId){
  const banner=document.getElementById(bannerId);
  if(!banner)return;
  const rect=banner.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const emojis=['⭐','✨','🌟','💫','🎉','👏'];
  for(let i=0;i<10;i++){
    const el=document.createElement('div');
    el.className='star-particle';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const angle=Math.random()*2*Math.PI;
    const dist=60+Math.random()*80;
    el.style.setProperty('--tx', Math.cos(angle)*dist+'px');
    el.style.setProperty('--ty', Math.sin(angle)*dist+'px');
    el.style.left=(cx-14)+'px';
    el.style.top=(cy-14)+'px';
    el.style.animationDelay=(Math.random()*0.15)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),900);
  }
}

// Animation bannière : réussite — affiche le résultat puis passe à la suivante
function bannerSuccess(p, ans){
  const banner=document.getElementById(`qb-${p}`);
  if(!banner)return;
  // Affiche le résultat complet dans la bannière
  const q=curQ[p];
  // Remplace le "=" final par "= [réponse]"
  const txt=q.txt.replace(/=$/, `= ${ans}`);
  banner.textContent=txt;
  banner.classList.remove('anim-ko');
  banner.classList.add('anim-ok');
  burstStars(`qb-${p}`);
  setTimeout(()=>{
    banner.classList.remove('anim-ok');
  },800);
}

// Animation bannière : erreur — secoue puis passe à la suivante
function bannerError(p){
  const banner=document.getElementById(`qb-${p}`);
  if(!banner)return;
  banner.classList.remove('anim-ok');
  banner.classList.add('anim-ko');
  setTimeout(()=>banner.classList.remove('anim-ko'),650);
}

function checkAns(p){
  const v=parseFloat(curVal[p]);
  if(isNaN(v)||curVal[p]==='')return;
  const team=p[0];
  if(Math.abs(v-curQ[p].ans)<0.05){
    // RÉUSSITE
    flashBtn(p,'ok-flash');
    bannerSuccess(p, curVal[p]);
    ppts[p]++; document.getElementById(`p-${p}`).textContent=ppts[p];
    scores[team]++; redraw();
    if(checkWin())return;
    // Délai court pour laisser voir la réussite avant la nouvelle question
    setTimeout(()=>{ curVal[p]=''; refreshDisp(p); newQ(p); }, 700);
  } else {
    // ERREUR
    flashBtn(p,'ko-flash');
    bannerError(p);
    setTimeout(()=>{ curVal[p]=''; refreshDisp(p); newQ(p); }, 700);
  }
}

function newQ(p){
  curQ[p]=genQ(selOp,selLvls[selOp]);
  document.getElementById(`q-${p}`).textContent=curQ[p].txt;
  // Mise à jour du bandeau en haut
  const banner=document.getElementById(`qb-${p}`);
  if(banner) banner.textContent=curQ[p].txt;
}

// ===== AFFICHAGE =====
function redraw(){
  document.getElementById('sc-b').textContent=scores.b;
  document.getElementById('sc-r').textContent=scores.r;

  // Logique tir à la corde :
  // Bleu est à GAUCHE, Rouge est à DROITE.
  // Bleu tire vers la gauche → quand bleu gagne, le drapeau va vers la GAUCHE (côté bleu).
  // diff > 0 = bleu avance → pct diminue (drapeau va à gauche)
  // diff < 0 = rouge avance → pct augmente (drapeau va à droite)
  const diff=scores.b-scores.r;
  const raw=50-(diff/target)*40;   // INVERSÉ : bleu gagne = flag vers gauche
  const pct=Math.max(6,Math.min(94,raw));

  document.getElementById('pr-bar').style.right=(100-pct)+'%';
  document.getElementById('pb-bar').style.left=pct+'%';

  // Corde (viewBox 0 0 1000 300)
  const W=1000,H=300,y=H*0.52,sag=22;
  const x=W*pct/100;
  const d1=`M 20,${y} Q ${x/2},${y+sag} ${x},${y} Q ${(x+W)/2},${y-sag} ${W-20},${y}`;
  const d2=`M 20,${y+5} Q ${x/2},${y+sag+5} ${x},${y+5} Q ${(x+W)/2},${y-sag+5} ${W-20},${y+5}`;
  document.getElementById('rp1').setAttribute('d',d1);
  document.getElementById('rp2').setAttribute('d',d2);
  document.getElementById('fg').setAttribute('transform',`translate(${x},${y})`);

  // Bleu est à gauche, rouge à droite.
  // Bleu gagne (diff>0) → drapeau va à gauche → rouge est tiré vers la gauche (translateX négatif)
  //                                              bleu avance vers la droite (translateX positif)
  // Rouge gagne (diff<0) → bleu est tiré vers la droite, rouge avance vers la gauche
  // Les 2 persos se déplacent dans le même sens que le drapeau
  // diff>0 (bleu gagne) → drapeau va à gauche → les 2 vont à gauche
  // diff<0 (rouge gagne) → drapeau va à droite → les 2 vont à droite
  const shift=-(diff/target)*70;
  document.getElementById('pb').style.transform=`translateX(${shift}px)`;
  document.getElementById('pr').style.transform=`translateX(${shift}px)`;
}

function checkWin(){
  const diff=scores.b-scores.r;
  if(Math.abs(diff)>=target){
    running=false;
    setTimeout(()=>showWin(diff>0?'b':'r'),350);
    return true;
  }
  return false;
}

// ===== NAVIGATION =====
function startGame(){
  target=parseInt(document.getElementById('rng').value);
  lastCfg={op:selOp,lvl:selLvls[selOp],target};
  scores={b:0,r:0}; ppts={b1:0,b2:0,r1:0,r2:0};
  curVal={b1:'',b2:'',r1:'',r2:''}; running=true;

  show('game'); buildKbds();
  PLAYERS.forEach(p=>{
    curVal[p]=''; refreshDisp(p); newQ(p);
    document.getElementById(`p-${p}`).textContent=0;
  });

  const oN={addition:'Additions',soustraction:'Soustractions',multiplication:'Multiplications',
    division:'Divisions',complement:'Compléments',mixte:'Mixte'};
  const lN=['Niv.1','Niv.2','Niv.3','Niv.4','Niv.5'];
  document.getElementById('top-info').textContent=oN[selOp]+' · '+lN[selLvls[selOp]];
  redraw();
}

function replayGame(){
  if(lastCfg){selOp=lastCfg.op;selLvls[selOp]=lastCfg.lvl;document.getElementById('rng').value=lastCfg.target;document.getElementById('rv').textContent=lastCfg.target;}
  startGame();
}

function goConfig(){running=false;show('cfg');}

function showWin(team){
  show('win');
  const isB=team==='b';
  document.getElementById('wm').textContent=(isB?'🔵 ÉQUIPE BLEUE':'🔴 ÉQUIPE ROUGE')+' GAGNE !';
  document.getElementById('wm').style.color=isB?'#a8d4ff':'#ffaaaa';
  document.getElementById('wd').textContent=`${target} point${target>1?'s':''} d'écart – Bravo !`;
  document.getElementById('ws-b').textContent=scores.b;
  document.getElementById('ws-r').textContent=scores.r;
  confetti(team);
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('on');s.style.display='none';});
  const s=document.getElementById(id); s.style.display='flex'; s.classList.add('on');
}

function confetti(t){
  const c=t==='b'?['#2355b0','#74b9ff','#ffd60a','#a29bfe','#fff']:['#b02323','#ff6b6b','#ffd60a','#ff9f43','#fff'];
  for(let i=0;i<72;i++){
    const el=document.createElement('div'); el.className='cft';
    el.style.cssText=`left:${rnd(0,100)}%;top:-20px;background:${c[rnd(0,c.length-1)]};width:${rnd(7,14)}px;height:${rnd(7,14)}px;animation-duration:${(rnd(14,28)/10)}s;animation-delay:${(rnd(0,14)/10)}s;border-radius:${rnd(0,1)?'50%':'3px'}`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),3600);
  }
}

// Init
document.addEventListener('DOMContentLoaded',()=>{
  show('cfg');
  const W=1000,H=300,y=H*0.52;
  const d=`M 20,${y} Q 250,${y+22} 500,${y} Q 750,${y-22} 980,${y}`;
  document.getElementById('rp1').setAttribute('d',d);
  document.getElementById('rp2').setAttribute('d',`M 20,${y+5} Q 250,${y+27} 500,${y+5} Q 750,${y-17} 980,${y+5}`);
});
</script>
